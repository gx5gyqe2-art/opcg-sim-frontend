name: CI

# プルリクエスト時と main への push 時に、型チェック・lint・本番ビルドを自動実行する。
# 失敗（赤）になればマージ前に検知できる。型チェックは build（tsc -b && vite build）にも
# 含まれるが、どの段階で壊れたかを切り分けやすいよう独立ステップでも実行する。

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc -b

      - name: Lint (eslint)
        run: npm run lint

      - name: Production build (vite)
        run: npm run build
